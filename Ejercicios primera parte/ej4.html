<!DOCTYPE html>
<html lang="en">

<head>

    <title>Ejercicio 4</title>
    <link rel="stylesheet" href="./Css/style.css">
</head>

<body>
    <div class="exercise-card">
        <h3>4. Calificación Final</h3>

            <label>Tres parciales (separados por coma):</label>
            <input type="text" id="parciales" class="form-control" placeholder="Ej: 8.5, 9, 10">
        </div>
        <div class="form-group">
            <label>Examen Final:</label>
            <input type="text" id="examen" class="form-control" placeholder="Ej: 9.2">

        <div class="form-group">
            <label>Trabajo Final:</label>
            <input type="text" id="trabajo" class="form-control" placeholder="Ej: 10">
        </div>
        <button class="btn-submit" onclick="calcularCalificacion()">Obtener Final</button>
        <div id="res4" class="result-display"></div>
    </div>
